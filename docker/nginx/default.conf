# ./docker/nginx/default.conf
server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/backend/public;

    # Configuración para el Frontend (Angular)
    location / {
        proxy_pass http://angular:4200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuración para la API del Backend
    location /api {
        # Elimina /api de la URL antes de pasarla a Laravel
        rewrite ^/api/(.*)$ /$1 break;
        
        # Pasa la petición a PHP-FPM
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        
        # Headers adicionales
        fastcgi_param HTTP_AUTHORIZATION $http_authorization;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # Configuración para archivos estáticos del backend (opcional)
    location /storage {
        alias /var/www/backend/storage/app/public;
        try_files $uri =404;
    }

    # Manejo de errores
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}