<!-- Fondo difuminado -->
<img src="banderanoru.jpeg" class="bg-img-blur" />

<!-- Banner superior -->
<div class="top-banner">
  <h1 class="banner-title">NORUEGA</h1>
  <!-- Icono que abre el popup -->
  <label for="modal-info-noruega" (click)="cargarInformacionMedica()">
    <img src="btninfo.png" class="banner-info-icon">
  </label>
</div>

<!-- Tarjetas centradas -->
<div class="viajes-grid">

  <div class="viaje-card" (click)="goOslo()">
    <img src="oslo.webp" />
    <p>VIAJE N° 1 (Oslo)</p>
  </div>

  <div class="viaje-card" (click)="goBergen()">
    <img src="bergen.webp" />
    <p>VIAJE N° 2 (Bergen)</p>
  </div>

  <div class="viaje-card" (click)="goStavanger()">
    <img src="stavanger.jpg" />
    <p>VIAJE N° 3 (Stavanger)</p>
  </div>

</div>

<input type="checkbox" id="modal-info-noruega" class="modal-checkbox">

<div class="modal-info-overlay">
  <div class="modal-info-content">

    <h2 class="info-title">Información Médica - Noruega</h2>

    <!-- ✅ TEXTO DINÁMICO DESDE LA BASE DE DATOS -->
    <p class="info-text">{{ informacionMedica }}</p>

    <label for="modal-info-noruega" class="cerrar-info">Cerrar</label>

  </div>
</div>

<div class="volver-pais-container">
  <button class="btn-volver-pais" routerLink="/pagina-principal">
    VOLVER A LA PÁGINA PRINCIPAL
  </button>
</div>
