<!-- Fondo difuminado -->
<img src="franciabandera.webp" class="bg-img-blur" />

<!-- Banner superior -->
<div class="top-banner">
  <h1 class="banner-title">FRANCIA</h1>
  <!-- Icono que abre el popup -->
  <label for="modal-info-francia" (click)="cargarInformacionMedica()">
    <img src="btninfo.png" class="banner-info-icon">
  </label>
</div>

<!-- Tarjetas centradas -->
<div class="viajes-grid">

  <div class="viaje-card">
    <img src="marsella.jpg" (click)="goMarsella()"/>
    <p>VIAJE N° 1 (Marsella)</p>
  </div>

  <div class="viaje-card">
    <img src="toulouse.jpg" (click)="goToulouse()"/>
    <p>VIAJE N° 2 (Toulouse)</p>
  </div>

  <div class="viaje-card">
    <img src="tours.jpg" (click)="goTours()"/>
    <p>VIAJE N° 3 (Tours)</p>
  </div>

</div>

<input type="checkbox" id="modal-info-francia" class="modal-checkbox">

<div class="modal-info-overlay">
  <div class="modal-info-content">

    <h2 class="info-title">Información Médica - Francia</h2>

    <!-- ✅ TEXTO DINÁMICO DESDE LA BASE DE DATOS -->
    <p class="info-text">{{ informacionMedica }}</p>

    <label for="modal-info-francia" class="cerrar-info">Cerrar</label>

  </div>
</div>

<div class="volver-pais-container">
  <button class="btn-volver-pais" routerLink="/pagina-principal">
    VOLVER A LA PÁGINA PRINCIPAL
  </button>
</div>
