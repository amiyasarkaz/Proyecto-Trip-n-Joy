<input type="checkbox" id="modal-bienvenido-toggle" class="modal-checkbox">

<div class="modal-overlay">
    <div class="modal-content">
        <label for="modal-bienvenido-toggle" class="close-btn" (click)="cerrarBienvenido()">&times;</label>
        
        <div class="welcome-card">
            <h1 class="welcome-title">BIENVENIDO</h1>
            
            <div class="logo-section">
                <img src="/logo_trip.png" alt="Trip N'Joy" class="logo">
            </div>
            
            <button class="btn-black" (click)="cerrarBienvenido()">
                Página Principal
            </button>
        </div>
    </div>
</div>
