<div class="valoraciones-page">
  
  <div class="page-header">
    <button class="btn-volver" (click)="volver()">← Volver</button>
    <h1>Valoraciones de {{ destino }}</h1>
  </div>

  <div class="filtros">
    <button (click)="mostrarRecientes()" [class.active]="!todasVisibles">📅 Más recientes (5)</button>
    <button (click)="mostrarTodas()" [class.active]="todasVisibles">📋 Ver todas ({{ valoraciones.length }})</button>
  </div>

  <div class="nuevo-comentario" *ngIf="usuarioLogueado">
    <h3>Deja tu opinión</h3>
    
    <div class="rating">
      <label>Puntuación:</label>
      <select [(ngModel)]="nuevoComentario.puntuacion">
        <option value="5">⭐⭐⭐⭐⭐ - Excelente</option>
        <option value="4">⭐⭐⭐⭐ - Muy bueno</option>
        <option value="3">⭐⭐⭐ - Bueno</option>
        <option value="2">⭐⭐ - Regular</option>
        <option value="1">⭐ - Malo</option>
      </select>
    </div>

    <textarea 
      [(ngModel)]="nuevoComentario.comentario"
      placeholder="Escribe tu experiencia..."
      rows="4"
    ></textarea>

    <button (click)="enviarComentario()" [disabled]="cargando">
      {{ cargando ? 'Enviando...' : 'Enviar comentario' }}
    </button>

    <div *ngIf="mensaje" class="mensaje-exito">{{ mensaje }}</div>
    <div *ngIf="error" class="mensaje-error">{{ error }}</div>
  </div>

  <div *ngIf="!usuarioLogueado" class="login-aviso">
    🔐 Inicia sesión para dejar tu opinión
  </div>

  <div class="valoracion" *ngFor="let v of valoracionesMostradas">
    <div class="avatar">👤</div>
    <div class="contenido">
      <h3>{{ v.usuario }}</h3>
      <div class="estrellas">{{ getStars(v.puntuacion) }}</div>
      <p>{{ v.comentario }}</p>
      <small>{{ v.created_at | date:'dd/MM/yyyy' }}</small>
    </div>
  </div>

  <div *ngIf="valoracionesMostradas.length === 0" class="sin-valoraciones">
    No hay valoraciones aún. ¡Sé el primero en comentar!
  </div>

</div>
