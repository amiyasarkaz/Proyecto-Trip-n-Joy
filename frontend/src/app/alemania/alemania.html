<!-- Fondo difuminado -->
<img src="alemaniafondo.jpg" class="bg-img-blur" />

<!-- Banner superior -->
<div class="top-banner">
  <h1 class="banner-title">ALEMANIA</h1>
  <!-- Icono que abre el popup -->
  <label for="modal-info-alemania">
    <img src="btninfo.png" class="banner-info-icon">
  </label>
</div>

<!-- Tarjetas centradas -->
<div class="viajes-grid">

  <div class="viaje-card" (click)="goBerlin()">
    <img src="berlin.avif" />
    <p>VIAJE N° 1 (Berlín)</p>
  </div>

  <div class="viaje-card" (click)="goBremen()">
    <img src="bremen.jpeg" />
    <p>VIAJE N° 2 (Bremen)</p>
  </div>

  <div class="viaje-card" (click)="goLubeck()">
    <img src="lubeck.jpg" />
    <p>VIAJE N° 3 (Lübeck)</p>
  </div>

</div>

<input type="checkbox" id="modal-info-alemania" class="modal-checkbox">

<div class="modal-info-overlay">
  <div class="modal-info-content">

    <h2 class="info-title">Información Médica - Alemania</h2>

    <p class="info-text">
      Es obligatorio contar con un seguro de salud válido en el país que cubra enfermedades y accidentes durante toda la estancia.<br><br>
      Infórmate con al menos 12 semanas de anticipación.
    </p>

    <label for="modal-info-alemania" class="cerrar-info">Cerrar</label>

  </div>
</div>

<div class="volver-pais-container">
  <button class="btn-volver-pais" routerLink="/pagina-principal">
    VOLVER A LA PÁGINA PRINCIPAL
  </button>
</div>
