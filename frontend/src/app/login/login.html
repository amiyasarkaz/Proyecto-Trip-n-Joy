<input type="checkbox" id="modal-login-toggle" class="modal-checkbox">

<div class="modal-container">
    <div class="modal-content">
        
        <label class="close-x" (click)="cerrarLogin()">&times;</label>
        
        <h1 class="titulo-login">INICIAR SESIÓN</h1>
        
        <div class="input-field">
            <span class="label">EMAIL</span>
            <input type="email" [(ngModel)]="userData.email" name="email" placeholder="correo@ejemplo.com">
        </div>

        <div class="input-field">
            <span class="label">CONTRASEÑA</span>
            <input type="password" [(ngModel)]="userData.password" name="password" placeholder="••••••••">
        </div>

        <div class="logo-container">
            <img src="/logo.png" alt="Trip N'Joy" class="logo-imagen">
            <p class="slogan">VIVA GRANDES EXPERIENCIAS</p>
        </div>

        <div class="decorative-line"></div>

        <button class="social-btn">
            <img src="https://www.google.com/favicon.ico" alt="Google" class="social-icon">
            Inicia sesión con Google
        </button>
        
        <button class="social-btn">
            <img src="https://www.apple.com/favicon.ico" alt="Apple" class="social-icon">
            Inicia sesión con Apple
        </button>

        <div class="footer-actions">
            <button class="btn-black" (click)="iniciarSesion()">
                Iniciar Sesión
            </button>
            <label class="btn-grey" (click)="abrirRegistro()">
                Registrate
            </label>
        </div>
    </div>
</div>
