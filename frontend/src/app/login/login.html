<input type="checkbox" id="modal-login-toggle" class="modal-checkbox">

<div class="modal-container">
    <div class="modal-content">
        
        <label for="modal-login-toggle" class="close-x">&times;</label>
        
        <h1 class="titulo-login">INICIAR SESIÓN</h1>
        
        <div class="input-field">
            <span class="label">EMAIL</span>
            <input type="email" placeholder="correo@ejemplo.com">
        </div>

        <div class="input-field">
            <span class="label">CONTRASEÑA</span>
            <input type="password" placeholder="••••••••">
        </div>

        <div class="logo-container">
            <img src="/logo.png" alt="Trip N'Joy" class="logo-imagen">
            <p class="slogan">VIVA GRANDES EXPERIENCIAS</p>
        </div>

        <div class="decorative-line"></div>

        <button class="social-btn">
            <img src="https://www.google.com/favicon.ico" alt="Google" class="social-icon">
            Inicia sesión con Google
        </button>
        
        <button class="social-btn">
            <img src="https://www.apple.com/favicon.ico" alt="Apple" class="social-icon">
            Inicia sesión con Apple
        </button>

        <div class="footer-actions">
            <button class="btn-black" onclick="window.location.href='/'; document.getElementById('modal-login-toggle').checked = false;">
                Iniciar Sesión
            </button>
            <label for="modal-registro-toggle" class="btn-grey" onclick="document.getElementById('modal-login-toggle').checked = false;">
                Registrate
            </label>
        </div>
    </div>
</div>
