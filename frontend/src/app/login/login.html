<input type="checkbox" id="modal-toggle" class="modal-checkbox">

<label for="modal-toggle" class="open-button">Iniciar Sesión</label>

<div class="modal-container">
    <div class="modal-content">
        <label for="modal-toggle" class="close-x">&times;</label>
        
        <h2>INICIAR SESIÓN</h2>
        
        <div class="input-field">
            <span>EMAIL</span>
            <input type="text">
        </div>

        <div class="input-field">
            <span>CONTRASEÑA</span>
            <input type="password">
        </div>

        <div class="logo-placeholder">
            <img src="tu-logo.png" alt="Logo">
        </div>

        <div class="divider">
            <hr> <span>o</span> <hr>
        </div>

        <button class="social-btn">Inicia sesión con Google</button>
        <button class="social-btn">Inicia sesión con Apple</button>

        <div class="footer-actions">
            <button class="btn-black">Iniciar Sesion</button>
            <button class="btn-grey">Registrate</button>
        </div>
    </div>
</div>
