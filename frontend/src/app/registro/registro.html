<input type="checkbox" id="modal-registro-toggle" class="modal-checkbox">

<div class="popup-overlay">
    <div class="popup-contenido">

        <label class="cerrar-popup" (click)="cerrarPopup()">&times;</label>
      
        <h2 class="titulo-popup">REGISTRO</h2>

        <div *ngIf="mensaje" class="alert alert-success">{{ mensaje }}</div>
        <div *ngIf="error" class="alert alert-error">{{ error }}</div>
 
        <div class="popup-grid">
            <div class="popup-col">
                <div class="campo-popup">
                    <span class="etiqueta">Nombre</span>
                    <input type="text" class="input-popup" [(ngModel)]="userData.name" name="name" placeholder="Tu nombre">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">NIF</span>
                    <input type="text" class="input-popup" [(ngModel)]="userData.nif" name="nif" placeholder="NIF/DNI">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">País de Origen</span>
                    <input type="text" class="input-popup" [(ngModel)]="userData.pais" name="pais" placeholder="Escribe tu país">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Email</span>
                    <input type="email" class="input-popup" [(ngModel)]="userData.email" name="email" placeholder="correo@ejemplo.com">
                </div>
            </div>

            <div class="popup-col">
                <div class="campo-popup">
                    <span class="etiqueta">Apellido</span>
                    <input type="text" class="input-popup" [(ngModel)]="userData.apellido" name="apellido" placeholder="Tus apellidos">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Contraseña</span>
                    <input type="password" class="input-popup" [(ngModel)]="userData.password" name="password" placeholder="Contraseña">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Confirmar Contraseña</span>
                    <input type="password" class="input-popup" [(ngModel)]="userData.password_confirmation" name="password_confirmation" placeholder="Confirma tu contraseña">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Teléfono</span>
                    <input type="tel" class="input-popup" [(ngModel)]="userData.telefono" name="telefono" placeholder="+34 123 456 789">
                </div>
            </div>
        </div>

        <button class="btn-registro-oscuro" (click)="registrarse()">
            REGÍSTRATE
        </button>

        <div class="popup-divider">
            <hr> <span>o</span> <hr>
        </div>

        <button class="btn-popup-social">
            <img src="https://www.google.com/favicon.ico" alt="Google" class="icono-social">
            Regístrate con Google
        </button>
        
        <button class="btn-popup-social">
            <img src="https://www.apple.com/favicon.ico" alt="Apple" class="icono-social">
            Regístrate con Apple
        </button>

        <div class="popup-login-link">
            ¿Ya tienes cuenta? 
            <label class="link-popup" (click)="cerrarPopup()">
                Inicia Sesión
            </label>
        </div>
    </div>
</div>
