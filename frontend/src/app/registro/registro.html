
<input type="checkbox" id="modal-registro-toggle" class="modal-checkbox">


<label for="modal-registro-toggle" class="btn-abrir-popup">Crear Cuenta</label>


<div class="popup-overlay">
    <div class="popup-contenido">

        <label for="modal-registro-toggle" class="cerrar-popup">&times;</label>
      
        <h2 class="titulo-popup">REGISTRO</h2>
 
        <div class="popup-grid">
            <div class="popup-col">
                <div class="campo-popup">
                    <span class="etiqueta">Nombre</span>
                    <input type="text" class="input-popup" placeholder="Tu nombre">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">NIF</span>
                    <input type="text" class="input-popup" placeholder="NIF/DNI">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">País de Origen</span>
                    <input type="text" class="input-popup" placeholder="Escribe tu país">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Email</span>
                    <input type="email" class="input-popup" placeholder="correo@ejemplo.com">
                </div>
            </div>


            <div class="popup-col">
                <div class="campo-popup">
                    <span class="etiqueta">Apellido</span>
                    <input type="text" class="input-popup" placeholder="Tus apellidos">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Contraseña</span>
                    <input type="password" class="input-popup" placeholder="Mínimo 6 caracteres">
                </div>

                <div class="campo-popup">
                    <span class="etiqueta">Teléfono</span>
                    <input type="tel" class="input-popup" placeholder="+34 123 456 789">
                </div>
            </div>
        </div>

        <button class="btn-popup-registro">REGÍSTRATE</button>


        <div class="popup-divider">
            <hr> <span>o</span> <hr>
        </div>

        <button class="btn-popup-social">
            <img src="https://www.google.com/favicon.ico" alt="Google" class="icono-social">
            Regístrate con Google
        </button>
        
        <button class="btn-popup-social">
            <img src="https://www.apple.com/favicon.ico" alt="Apple" class="icono-social">
            Regístrate con Apple
        </button>

        <div class="popup-login-link">
            ¿Ya tienes cuenta? 
            <label for="modal-toggle" class="link-popup">Inicia Sesión</label>
        </div>
    </div>
</div>
