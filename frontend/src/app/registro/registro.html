<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup de Registro</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <button id="btnAbrirRegistro" class="btn-abrir">Crear Cuenta</button>

 
    <div id="popupRegistro" class="popup">
        <div class="contenido-popup">
            <span id="btnCerrar" class="cerrar">&times;</span>
            
            <h1 class="titulo-registro">REGISTRO</h1>

            <h2 class="subtitulo-registro">REGÍSTRATE</h2>
            
            <form id="formRegistro" class="formulario-registro">
                <div class="campo">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan Pérez">
                </div>
                
                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
                </div>
                
                <div class="campo">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 6 caracteres">
                </div>
                
                <button type="submit" class="btn-registrarse">REGÍSTRATE</button>
            </form>
            
            
            <div id="mensajePopup" class="mensaje"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
