<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup de Registro</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <label for="abrir-popup" class="btn-abrir">Crear Cuenta</label>

    <input type="checkbox" id="abrir-popup" class="abrir-popup-checkbox">
  
    <div class="popup">
        <div class="contenido-popup">
            
     
            <label for="abrir-popup" class="cerrar">&times;</label>
            
            <h1 class="titulo-registro">REGISTRO</h1>
            <h2 class="subtitulo-registro">REGÍSTRATE</h2>
            
   
            <form class="formulario-registro">
                <div class="campo">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
                </div>
                
                <div class="campo">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>
                
                <div class="campo">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                </div>
                
                <button type="submit" class="btn-registrarse">REGÍSTRATE</button>
            </form>
            
            
        </div>
    </div>

</body>
</html>
