<div class="dashboard-page">
  <div class="dashboard-container">

    <h1 class="titulo-admin">Página del Administrador</h1>

    <div class="cards-admin">

      <!-- ACTIVIDADES -->
      <div class="card-admin" routerLink="/gestionaractividades">
         <img src="/actividades.png" alt="Actividades">
         <h2>Actividades</h2>
         <p>Hay {{ actividades }} Actividades Disponibles</p>
        </div>

        <div class="card-admin" routerLink="/admin-usuarios">
           <img src="/usuarios.png" alt="Usuarios">
            <h2>Usuarios</h2>
             <p>Hay {{ usuarios }} Usuarios Registrados</p>
          </div>

          <div class="card-admin" routerLink="/gestionar-alojamientos">
              <img src="/alojamientos.png" alt="Alojamientos">
              <h2>Alojamientos</h2>
              <p>Hay {{ alojamientos }} Alojamientos Disponibles</p>
            </div>

    </div>

    <div class="acciones-admin">
      <button (click)="gestionarActividades()">Gestionar Actividades</button>
      <button (click)="administrarUsuarios()">Administrar Usuarios</button>
      <button (click)="gestionarInformacion()">Gestionar Información</button>
      <button (click)="gestionarAlojamientos()">Gestionar Alojamientos</button>
    </div>

  </div>
</div>
