<div class="dashboard-page">
  <div class="dashboard-container">

    <div class="dashboard-header">
    <button class="dashboard-logout-btn" (click)="cerrarSesionAdmin()">
    CERRAR SESIÓN
    </button>
</div>

    <h1 class="titulo-admin">Página del Administrador</h1>

    <div class="cards-admin">

      <!-- ACTIVIDADES -->
      <div class="card-admin" routerLink="/gestionaractividades">
         <img src="/actividades.png" alt="Actividades">
         <h2>Actividades</h2>
         <p>Hay {{ actividades }} Actividades Disponibles</p>
        </div>

        <div class="card-admin" routerLink="/administrar-usuarios">
           <img src="/usuarios.png" alt="Usuarios">
            <h2>Usuarios</h2>
             <p>Hay {{ usuarios }} Usuarios Registrados</p>
          </div>

            <div class="card-admin" routerLink="/informacion-medica">
              <img src="/medico.webp" alt="Información Médica">
              <h2>Información Médica</h2>
              <p>Consulta la información médica para diferentes países</p>
            </div>

    </div>

    <div class="acciones-admin">
      <button (click)="gestionarActividades()">Gestionar Actividades</button>
      <button (click)="administrarUsuarios()">Administrar Usuarios</button>
      <button (click)="gestionarInformacion()">Gestionar Información Médica</button>
    </div>

  </div>
</div>
