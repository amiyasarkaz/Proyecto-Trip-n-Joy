<div class="admin-page">

  <header class="admin-header-global">
    <nav class="admin-topnav-global">
      <button class="link-global" (click)="volverDashboard()">Volver al Inicio</button>
      <button class="link-global" (click)="administrarUsuarios()">Administrar Usuarios</button>
      <button class="link-global" (click)="gestionarInfoMedica()">Gestionar Información Médica</button>
      <button class="link-global" (click)="gestionarAlojamientos()">Gestionar Alojamientos</button>
    </nav>
  </header>

  <h1 class="titulo-seccion">Gestionar Actividades</h1>

  <main class="actividades-grid">

    <ng-container *ngFor="let a of actividades; let i = index">

      <article class="actividad-card">

        <!-- Checkbox del popup -->
        <input type="checkbox" class="popup-check" [id]="'popup-' + i">

        <!-- Tarjeta -->
        <div class="thumb">
          <img [src]="a.imagen" [alt]="a.titulo">
        </div>

        <div class="card-body">
          <h2>{{ a.titulo }}</h2>
          <p class="descripcion">{{ a.descripcion }}</p>
          <p class="fecha"><strong>Inicio:</strong> {{ a.inicio }}</p>

          <label class="btn-edit" [for]="'popup-' + i">Editar Actividad</label>
        </div>

        <!-- Overlay -->
        <label class="popup-overlay" [for]="'popup-' + i"></label>

        <!-- Popup del mismo tamaño que la tarjeta -->
        <div class="popup-box">
          <div class="popup-content">

            <h2>{{ a.titulo }}</h2>

            <img class="popup-img" [src]="a.imagen" [alt]="a.titulo">

            <p>{{ a.descripcion }}</p>
            <p><strong>Inicio:</strong> {{ a.inicio }}</p>

            <label class="popup-close" [for]="'popup-' + i">Cerrar</label>

          </div>
        </div>

      </article>

    </ng-container>

  </main>

</div>
