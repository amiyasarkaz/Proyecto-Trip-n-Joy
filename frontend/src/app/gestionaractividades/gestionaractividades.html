<div style="padding: 20px;">

  <div style="margin-bottom: 20px;">
    <button (click)="volverDashboard()" style="background: #007bff; color: white; border: none; padding: 10px 20px;">← Volver</button>
    <h1 style="display: inline-block; margin-left: 20px;">Gestionar Actividades</h1>
  </div>

  <div *ngIf="mensaje" style="background: #d4edda; color: #155724; padding: 10px;">{{ mensaje }}</div>
  <div *ngIf="error" style="background: #f8d7da; color: #721c24; padding: 10px;">{{ error }}</div>

  <!-- Contador -->
  <div style="background: #28a745; color: white; padding: 10px; text-align: center; border-radius: 8px; margin-bottom: 20px;">
    📊 Total actividades: {{ actividades.length }}
  </div>

  <!-- Grid de actividades con imágenes -->
  <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
    <div *ngFor="let a of actividades" style="border: 1px solid #ddd; border-radius: 10px; overflow: hidden; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
      <!-- Imagen con fallback si no existe -->
      <img [src]="'http://localhost:4200' + a.imagen" 
           (error)="a.imagen = '/actividad-default.png'"
           style="width: 100%; height: 170px; object-fit: cover;">
      <div style="padding: 15px;">
        <h2 style="margin: 0 0 10px 0; font-size: 18px;">{{ a.nombre }}</h2>
        <p style="margin: 5px 0; color: #666; font-size: 14px;">{{ a.descripcion }}</p>
        <p style="margin: 5px 0;"><strong>Destino:</strong> {{ a.destino }} - {{ a.ciudad }}</p>
        <p style="margin: 5px 0;"><strong>Precio:</strong> {{ a.precio }} €</p>
        <p style="margin: 5px 0;"><strong>Duración:</strong> {{ a.duracion }}</p>
        <p style="margin: 5px 0;"><strong>Inicio:</strong> {{ a.fecha_inicio | date:'dd/MM/yyyy' }}</p>
        <button (click)="abrirEditor(a)" style="background: #ffc107; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin-top: 10px;">
          ✏️ Editar
        </button>
      </div>
    </div>
  </div>

  <!-- Modal de edición -->
  <div *ngIf="actividadEditando" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: white; padding: 25px; border-radius: 15px; width: 90%; max-width: 500px;">
      <h2 style="margin-top: 0;">✏️ Editar Actividad</h2>
      
      <label style="display: block; margin: 10px 0 5px;">Nombre:</label>
      <input type="text" [(ngModel)]="actividadEditando.nombre" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
      
      <label style="display: block; margin: 10px 0 5px;">Descripción:</label>
      <textarea [(ngModel)]="actividadEditando.descripcion" rows="3" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
      
      <label style="display: block; margin: 10px 0 5px;">Destino:</label>
      <input type="text" [(ngModel)]="actividadEditando.destino" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
      
      <label style="display: block; margin: 10px 0 5px;">Ciudad:</label>
      <input type="text" [(ngModel)]="actividadEditando.ciudad" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
      
      <label style="display: block; margin: 10px 0 5px;">Precio (€):</label>
      <input type="number" step="0.01" [(ngModel)]="actividadEditando.precio" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
      
      <label style="display: block; margin: 10px 0 5px;">Duración:</label>
      <input type="text" [(ngModel)]="actividadEditando.duracion" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">
      
      <label style="display: block; margin: 10px 0 5px;">Fecha inicio:</label>
      <input type="date" [(ngModel)]="actividadEditando.fecha_inicio" style="width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;">

      <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button (click)="guardarActividadEditada()" [disabled]="cargando" style="flex: 1; background: #28a745; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
          {{ cargando ? 'Guardando...' : '💾 Guardar' }}
        </button>
        <button (click)="cerrarEditor()" style="flex: 1; background: #6c757d; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer;">
          ❌ Cancelar
        </button>
      </div>
    </div>
  </div>

</div>
