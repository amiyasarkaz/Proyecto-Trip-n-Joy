<div class="admin-page">

  <nav class="admin-topnav">
    <button class="link" (click)="volverInicio()">Volver al Inicio</button>
    <button class="link" (click)="administrarUsuarios()">Administrar Usuarios</button>
    <button class="link" (click)="gestionarInfoMedica()">Gestionar Información Médica</button>
    <button class="link" (click)="gestionarAlojamientos()">Gestionar Alojamientos</button>
  </nav>

  <header class="admin-header">
    <h1>Gestionar Actividades</h1>
  </header>

  <main class="actividades-grid">

  <ng-container *ngFor="let a of actividades; let i = index">

    <article class="actividad-card">

      <!-- Checkbox del popup -->
      <input type="checkbox" class="popup-check" [id]="'popup-' + i">

      <div class="thumb">
        <img [src]="a.imagen" [alt]="a.titulo">
      </div>

      <div class="card-body">
        <h2>{{ a.titulo }}</h2>
        <p class="descripcion">{{ a.descripcion }}</p>
        <p class="fecha"><strong>Inicio:</strong> {{ a.inicio }}</p>

        <!-- Botón abrir -->
        <label class="btn-edit" [for]="'popup-' + i">Editar Actividad</label>
      </div>

      <!-- Overlay -->
      <label class="popup-overlay" [for]="'popup-' + i"></label>

      <!-- Popup -->
      <div class="popup-box">
        <div class="popup-content">

          <h2>{{ a.titulo }}</h2>

          <img class="popup-img" [src]="a.imagen" [alt]="a.titulo">

          <p>{{ a.descripcion }}</p>
          <p><strong>Inicio:</strong> {{ a.inicio }}</p>

          <!-- Botón cerrar -->
          <label class="popup-close" [for]="'popup-' + i">Cerrar</label>

        </div>
      </div>

    </article>

  </ng-container>

</main>


</div>
