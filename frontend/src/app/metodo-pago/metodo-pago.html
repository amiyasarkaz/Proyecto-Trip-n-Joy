<div class="payment-bg">
  <div class="payment-container">

    <h2>Método de pago</h2>

    <form class="payment-form">

      <label>Email</label>
      <input type="email" placeholder="tuemail@gmail.com" required>

      <label>Datos de la Tarjeta</label>
      <div class="card-input">
        <input type="text" placeholder="1234 5678 9012 3456" maxlength="19" required>
        <div class="card-icons">
          <img src="assets/icons/visa.png" alt="Visa">
          <img src="assets/icons/mastercard.png" alt="Mastercard">
        </div>
      </div>

      <label>País o Región</label>
      <select required>
        <option value="">Selecciona tu país</option>
        <option>España</option>
        <option>México</option>
        <option>Argentina</option>
        <option>Colombia</option>
      </select>

      <div class="buttons">
        <button type="button" class="btn-back">Regresar</button>
        <button type="submit" class="btn-confirm">Confirmar Pago</button>
      </div>

    </form>

  </div>
</div>
