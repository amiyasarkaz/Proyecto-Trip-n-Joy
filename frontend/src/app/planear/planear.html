<input type="checkbox" id="modal-planear-toggle" class="modal-checkbox">

<label for="modal-planear-toggle" class="open-button">Planear Viaje</label>

<div class="modal-overlay">
    <div class="modal-content">
        <label for="modal-planear-toggle" class="close-btn">&times;</label>
        
        <div class="planear-card">
            <h1 class="planear-title">¡COMIENZA A PLANEAR TU VIAJE!</h1>
            
            <p class="planear-description">
                Para poder empezar a planificar tu próxima aventura, 
                deberás escoger el país al que quieres visitar
            </p>
            
            <div class="divider"></div>
            
            <h2 class="planear-subtitle">SELECCIONA TU PAÍS</h2>
            
            <div class="paises-grid">
                <div class="pais-item">Noruega</div>
                <div class="pais-item">Alemania</div>
                <div class="pais-item">Francia</div>
            </div>
            
            <button class="planear-btn">Continuar</button>
        </div>
    </div>
</div>
