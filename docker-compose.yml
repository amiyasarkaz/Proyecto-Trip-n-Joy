services:
  trip-backend:
    build: ./backend
    image: trip_n_joy_laravel
    container_name: trip-backend
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/html
    networks:
      - trip-network
    depends_on:
      - trip-mysql

  trip-frontend:
    image: node:20-alpine
    container_name: trip-frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
    command: sh -c "cd /app && npm install && npm start -- --host 0.0.0.0"
    networks:
      - trip-network

  trip-mysql:
    image: mysql:5.7
    container_name: trip-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: trip_n_joy_db
    networks:
      - trip-network

networks:
  trip-network:
    driver: bridge